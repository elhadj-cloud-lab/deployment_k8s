apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "produit-back.fullname" . }}
  labels:
{{ include "produit-back.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "produit-back.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "produit-back.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
{{- with .Values.initContainers }}
{{- if . }}
      initContainers:
{{ toYaml . | indent 8 }}
{{- end }}
{{- end }}
      containers:
        - name: {{ include "produit-back.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
{{- with .Values.env }}
{{ toYaml . | indent 12 }}
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
