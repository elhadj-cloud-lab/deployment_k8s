apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-postgres-auth
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 15.*
    helm:
      releaseName: postgres-auth
      values: |
        auth:
          username: auth_user
          database: auth_db
          existingSecret: postgres-auth-credentials
        image:
          tag: 16.4.0-debian-12-r0
        primary:
          persistence:
            enabled: true
            size: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
