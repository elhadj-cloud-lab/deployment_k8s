apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-produit-back
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/elhadj-cloud-lab/deployment_k8s.git
    targetRevision: main
    path: charts/produit-back
    helm:
      releaseName: produit-back
      valueFiles:
        - ../../apps/produit_back/values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
