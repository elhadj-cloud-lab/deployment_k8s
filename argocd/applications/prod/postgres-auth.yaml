apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-postgres-auth
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 15.*
    helm:
      releaseName: postgres-auth
      values: |
        auth:
          username: auth_user
          database: auth_db
          existingSecret: postgres-auth-credentials
        primary:
          persistence:
            enabled: true
            size: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
