apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-produit-back
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/elhadj-cloud-lab/deployment_k8s.git
    targetRevision: main
    path: charts/produit-back
    helm:
      releaseName: produit-back
      valueFiles:
        - ../../apps/produit-back/values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
