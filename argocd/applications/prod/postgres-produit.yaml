apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-postgres-produit
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 15.*
    helm:
      releaseName: postgres-produit
      values: |
        auth:
          username: produit_user
          password: produit_password
          database: produit_db
        primary:
          persistence:
            enabled: true
            size: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
